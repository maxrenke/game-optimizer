name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit-tests:
    name: Unit Tests (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Run unit tests
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File gaming-optimizer.tests.ps1
          exit $LASTEXITCODE
